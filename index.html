<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Pulse</title>

<link rel="stylesheet" href="css/style.css?v=2.0">
<link rel="icon" href="./img/icon.png">

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0f19;
  color:#fff;
}

.wrp{
  max-width:480px;
  margin:0 auto;
  padding:15px;
}

/* HERO */
.hero{
  text-align:center;
}

.hero h1{
  font-size:28px;
  color:#facc15;
  margin-bottom:10px;
}

.hero p{
  font-size:16px;
  opacity:0.9;
}

.hero img{
  width:100%;
  max-width:260px;
  margin:15px auto;
  display:block;
  filter:drop-shadow(0 10px 25px rgba(0,0,0,0.6));
}

/* BENEFITS */
.benefits{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:20px 0;
}

.card{
  background:#121826;
  padding:12px;
  border-radius:12px;
  font-size:13px;
  text-align:center;
}

/* PRICE */
.price-box{
  background:#111827;
  padding:15px;
  border-radius:14px;
  text-align:center;
  margin:20px 0;
  position:relative;
}

.badge{
  position:absolute;
  top:-10px;
  right:-10px;
  background:#ef4444;
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
}

.old-cost{
  text-decoration:line-through;
  opacity:0.6;
}

.cost{
  font-size:30px;
  color:#22c55e;
  font-weight:bold;
}

/* FORM */
form{
  display:flex;
  flex-direction:column;
  gap:10px;
}

input{
  padding:12px;
  border-radius:10px;
  border:none;
  font-size:14px;
}

button{
  background:#ef4444;
  color:#fff;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  font-size:16px;
}

/* STICKY BUTTON */
.sticky{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#ef4444;
  text-align:center;
  padding:12px;
  font-weight:bold;
}

.sticky a{
  color:#fff;
  text-decoration:none;
}
</style>

<script src="./js/date.js"></script>
</head>

<body>

<div class="wrp">

<!-- HERO -->
<section class="hero">
  <h1>POWER PULSE</h1>
  <p>По-силна ерекция. Повече увереност. Реален резултат.</p>
  <img src="./img/vigamax.png" alt="">
</section>

<!-- BENEFITS -->
<div class="benefits">
  <div class="card">По-силна ерекция</div>
  <div class="card">Повече удоволствие</div>
  <div class="card">Повишена издръжливост</div>
  <div class="card">Увереност всеки ден</div>
</div>

<!-- PRICE -->
<div class="price-box">
  <div class="badge">-50%</div>
  <p class="old-cost">150 BGN</p>
  <p class="cost">75 BGN</p>
</div>

<!-- TIMER (оставил твой js) -->
<div class="offer-counter">
  <div id="countdown" class="countdown">
    <span class="minutes"></span> :
    <span class="seconds"></span>
  </div>
</div>

<!-- FORM -->
<form id="order">
  <input placeholder="Име" name="name" required>
  <input placeholder="Телефонен номер" name="phone" required>
  <button>ПОРЪЧАЙ СЕГА</button>
</form>

<p style="text-align:center; font-size:13px; opacity:0.7; margin-top:15px;">
Плащане при доставка. Дискретна опаковка.
</p>

</div>

<!-- STICKY CTA -->
<div class="sticky">
  <a href="#order">ПОРЪЧАЙ СЕГА - 75 BGN</a>
</div>

<script src="./js/main.js"></script>

</body>
</html>
